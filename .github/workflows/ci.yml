name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest tests/ -v --tb=short
        env:
          # Unit tests use mocks — no real credentials needed
          AGEVAL_SUPABASE_URL: "https://test.supabase.co"
          AGEVAL_SUPABASE_SERVICE_KEY: "test-key"

      - name: Verify package import
        run: |
          pip install -e . --quiet
          python -c "
          import ageval
          print(f'ageval {ageval.__version__} imports OK')
          from ageval import AgentSession, trace_agent, trace_callable, classify_error
          from ageval import register_metric, list_metrics, score_with_custom_metrics
          print(f'All framework-agnostic APIs importable')
          print(f'{len(list_metrics())} built-in metrics registered')
          assert ageval.__version__ == '0.3.0', f'Version mismatch: {ageval.__version__}'
          print('Version check passed')
          "

      - name: Verify OpenAI tracer import
        run: |
          python -c "
          from ageval import trace_openai
          assert trace_openai is not None, 'trace_openai should be importable with openai installed'
          print('OpenAI tracer importable')
          "

      - name: Guard against tracked secrets
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "::error::.env is tracked in git — this leaks secrets!"
            exit 1
          fi
          echo ".env is not tracked ✓"

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lint + type-check tools
        run: |
          pip install --upgrade pip
          pip install ruff mypy
          pip install -r requirements.txt

      - name: Run ruff (lint)
        run: ruff check . --select E,W,F --ignore E501,E402 --per-file-ignores "__init__.py:F401"

      - name: Run mypy (type check — main modules)
        run: mypy main.py merger/ eval/ ageval/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true   # type errors are warnings for now, not blockers
