name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest tests/ -v --tb=short
        env:
          # Unit tests use mocks — no real credentials needed
          AGEVAL_SUPABASE_URL: "https://test.supabase.co"
          AGEVAL_SUPABASE_SERVICE_KEY: "test-key"

      - name: Verify package import
        run: |
          cd ageval
          pip install -e . --quiet
          python -c "import ageval; print(f'ageval {ageval.__version__} imports OK')"

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check . --select E,W,F --ignore E501,W503
        continue-on-error: true   # lint warnings don't block CI for now
