version: '3.8'

services:
  # --------------------------------------------------------
  # ClickHouse - High-performance columnar database for traces
  # --------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: ageval-clickhouse
    ports:
      - "8123:8123" # HTTP interface
      - "9000:9000" # Native client
    environment:
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
      - CLICKHOUSE_DB=ageval_traces
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./docker/clickhouse-init:/docker-entrypoint-initdb.d
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # --------------------------------------------------------
  # Redis - Used as the message broker (Streams) and cache
  # --------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ageval-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru

  # --------------------------------------------------------
  # Backend API - FastAPI (simulated for compose)
  # --------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ageval-api
    ports:
      - "8000:8000"
    depends_on:
      - clickhouse
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CLICKHOUSE_URL=clickhouse://clickhouse:9000/ageval_traces
      - AGEVAL_SUPABASE_URL=${AGEVAL_SUPABASE_URL}
      - AGEVAL_SUPABASE_SERVICE_KEY=${AGEVAL_SUPABASE_SERVICE_KEY}
    volumes:
      - .:/app

volumes:
  clickhouse_data:
  redis_data:
