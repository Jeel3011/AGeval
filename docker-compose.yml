version: '3.8'

services:
  # --------------------------------------------------------
  # Redis — rate-limiter backend for the API
  # --------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ageval-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # --------------------------------------------------------
  # AGeval ingestion + query API (FastAPI)
  # --------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ageval-api
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379/0
      - AGEVAL_SUPABASE_URL=${AGEVAL_SUPABASE_URL}
      - AGEVAL_SUPABASE_SERVICE_KEY=${AGEVAL_SUPABASE_SERVICE_KEY}
      - AGEVAL_ADMIN_SECRET=${AGEVAL_ADMIN_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AGEVAL_CORS_ORIGINS=${AGEVAL_CORS_ORIGINS:-*}
    env_file:
      - .env

  # --------------------------------------------------------
  # Merger worker — polls episode_jobs, scores episodes,
  # generates embeddings, runs clustering
  # --------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: ageval-worker
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - AGEVAL_SUPABASE_URL=${AGEVAL_SUPABASE_URL}
      - AGEVAL_SUPABASE_SERVICE_KEY=${AGEVAL_SUPABASE_SERVICE_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
    env_file:
      - .env
    restart: unless-stopped

  # --------------------------------------------------------
  # Next.js dashboard (production build)
  # --------------------------------------------------------
  dashboard:
    image: node:20-alpine
    container_name: ageval-dashboard
    working_dir: /app
    command: sh -c "npm ci --quiet && npm run build && npm start"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      - api

volumes:
  redis_data:
